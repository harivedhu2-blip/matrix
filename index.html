<!DOCTYPE html>
<html>
<head>
  <title>AI Marketing Agent</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    #header {
      text-align: center;
      padding: 15px;
      background: #020617;
      border-bottom: 1px solid #1e293b;
    }

    #header h1 {
      margin: 0;
      color: #22c55e;
    }

    #topPanel {
      padding: 10px;
      background: #020617;
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    input, select {
      padding: 8px;
      border-radius: 6px;
      border: none;
      background: #1e293b;
      color: white;
    }

    #chatBox {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .msg {
      padding: 12px;
      border-radius: 10px;
      max-width: 70%;
      white-space: pre-wrap;
    }

    .user {
      background: #22c55e;
      align-self: flex-end;
    }

    .bot {
      background: #1e293b;
      align-self: flex-start;
    }

    #bottomBar {
      display: flex;
      padding: 15px;
      background: #020617;
    }

    #promptInput {
      flex: 1;
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: #1e293b;
      color: white;
      height: 50px;
    }

    button {
      margin-left: 10px;
      padding: 12px 20px;
      background: #22c55e;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div id="header">
  <h1>MARKIX</h1>
</div>

<div id="topPanel">
  <input id="brand" placeholder="Brand">
  <select id="contentType">
    <option value="">Platform</option>
    <option>Instagram</option>
    <option>YouTube</option>
    <option>Blog</option>
    <option>Email</option>
  </select>
  <input id="tone" placeholder="Tone">
  <input id="audience" placeholder="Audience">
  <input id="cta" placeholder="CTA">
</div>

<div id="chatBox"></div>

<div id="bottomBar">
  <textarea id="promptInput" placeholder="Type your message..."></textarea>
  <button onclick="sendMessage()">Send</button>
</div>

<script>

const chatBox = document.getElementById("chatBox");
const input = document.getElementById("promptInput");

function addMessage(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}

input.addEventListener("keydown", function(e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

async function sendMessage() {

  const message = input.value.trim();
  if (!message) return;

  const brand = document.getElementById("brand").value;
  const contentType = document.getElementById("contentType").value;
  const tone = document.getElementById("tone").value;
  const audience = document.getElementById("audience").value;
  const cta = document.getElementById("cta").value;

  input.value = "";

  addMessage(message, "user");

  const loading = document.createElement("div");
  loading.className = "msg bot";
  loading.innerText = "Generating...";
  chatBox.appendChild(loading);

  try {

    const res = await fetch("https://matrix-oiu7.onrender.com/generate", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        brand,
        contentType,
        tone,
        audience,
        cta,
        customPrompt: message
      })
    });

    const data = await res.json();

    loading.remove();
    addMessage(data.output, "bot");

  } catch (err) {
    loading.remove();
    addMessage("❌ Backend error", "bot");
  }
}

</script>

</body>
</html>
